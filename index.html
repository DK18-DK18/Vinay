<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
margin:0;
background:#fff0f5;
text-align:center;
color:#333;
}

header{
background:linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
url("background.jpg");
background-size:cover;
color:white;
padding:120px 20px;
}

header h1{
font-size:50px;
margin:0;
}

header p{
font-size:22px;
}

.section{
padding:50px 20px;
}

.couple{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
margin-top:30px;
}

.couple img{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:6px solid #ff66a3;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:30px;
}

.gallery img{
width:250px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.details{
background:white;
margin:40px auto;
padding:30px;
max-width:600px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

footer{
background:#ff66a3;
color:white;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>Rahul ❤️ Sneha</h1>
<p>We Are Getting Married</p>
</header>

<section class="section">

<h2>Meet The Couple</h2>

<div class="couple">
<div>
<img src="groom.jpg">
<h3>Rahul</h3>
</div>

<div>
<img src="bride.jpg">
<h3>Sneha</h3>
</div>
</div>

</section>

<section class="section">

<h2>Our Moments</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

</section>

<section class="details">

<h2>Wedding Details</h2>

<p><b>Date:</b> 20 June 2026</p>
<p><b>Time:</b> 10:30 AM</p>
<p><b>Venue:</b> Sri Convention Hall</p>
<p>We request the pleasure of your company to celebrate our special day.</p>

</section>

<footer>
<p>With Love ❤️ Rahul & Sneha</p>
</footer>

</body>
</html>
